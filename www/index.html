<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https: ssl.gstatic.com 'unsafe-eval' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src *;">
    <title>CAM APP</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
            background-color: #ffffff;
            color: #111111;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Título Central --- */
        .main-content {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-align: center;
        }

        /* --- Boton iniciar camara --- */
        #btnTake {
            width: 100%;
            background-color: #000000;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            padding-top: 25px;
            padding-bottom: calc(25px + env(safe-area-inset-bottom));
            
            transition: background-color 0.2s;
        }

        #btnTake:active {
            background-color: #333333;
        }

        /* --- preview de la foto --- */
        #dialog {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .dialog-hidden {
            display: none !important;
        }

        .dialog-content {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #previewImage {
            width: 100%;
            height: 350px;
            object-fit: cover; 
            border-radius: 8px;
            background-color: #eeeeee;
        }

        .dialog-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-modal {
            flex: 1;
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #btnRepeat { background-color: #f1f1f1; color: #333; }
        #btnSave { background-color: #000000; color: #ffffff; }
    </style>
</head>
<body>

    <main class="main-content">
        <h1 class="main-title">CAM APP</h1>
    </main>

    <button id="btnTake">start taking photos</button>

    <div id="dialog" class="dialog-hidden">
        <div class="dialog-content">
            <img id="previewImage" alt="Previsualización" />
            
            <div class="dialog-buttons">
                <button id="btnRepeat" class="btn-modal">Repetir</button>
            </div>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
